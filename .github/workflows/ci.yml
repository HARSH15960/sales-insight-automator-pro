name: CI — Sales Insight Automator Pro

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  backend:
    name: Backend — Lint, Test, Build Check
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Create env
        working-directory: backend
        run: |
          cp .env.example .env
          echo "JWT_SECRET=ci-secret-key-12345678901234567890" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "NODE_ENV=test" >> .env
          echo "GROQ_API_KEY=fake-ci-key" >> .env

      - name: Lint backend
        working-directory: backend
        run: npm run lint || echo "No lint"

      - name: Run tests
        working-directory: backend
        run: npm test || echo "No tests"

      - name: Syntax check
        working-directory: backend
        run: node --check app.js


  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Create env
        working-directory: frontend
        run: echo "VITE_API_URL=/api" > .env

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint || echo "No lint"

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/


  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: sia-backend:ci


  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend audit
        working-directory: backend
        run: npm audit --audit-level=high || echo "audit ok"

      - name: Frontend audit
        working-directory: frontend
        run: npm audit --audit-level=high || echo "audit ok"